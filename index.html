<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precon Finder — Coming Soon</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #0057C8;
      --black: #0A0A0A;
      --grey: #6B7280;
      --light-grey: #F3F4F6;
      --border: #E5E7EB;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 100%;
      max-width: 340px;
      height: auto;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 1rem;
      color: var(--black);
    }

    h1 span {
      color: var(--blue);
    }

    p {
      font-size: 1.0625rem;
      color: var(--grey);
      line-height: 1.65;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: var(--blue);
      border-radius: 99px;
      margin: 0 auto 2.5rem;
    }

    /* ── Flodesk embed placeholder ── */
    .signup-wrapper {
      background: var(--light-grey);
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 2rem 1.5rem;
      margin-bottom: 2rem;
    }

    .signup-wrapper .placeholder-label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue);
      background: rgba(0, 87, 200, 0.08);
      border-radius: 4px;
      padding: 0.2em 0.6em;
      margin-bottom: 1rem;
    }

    .signup-wrapper p {
      font-size: 0.9375rem;
      margin-bottom: 0;
      color: var(--grey);
    }

    /* TODO: Replace .signup-wrapper entirely with your Flodesk embed snippet */

    footer {
      margin-top: 3rem;
      font-size: 0.8125rem;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="container">

    <img src="logo-colour.png" alt="Precon Finder" class="logo" />

    <h1>Something exciting<br />is <span>coming soon.</span></h1>

    <div class="divider"></div>

    <p>
      We're building the easiest way to discover preconstruction real estate opportunities.
      Be the first to know when we launch.
    </p>

    <!-- ════════════════════════════════════════════════
         TODO: Replace this entire .signup-wrapper block
         with your Flodesk embed code.
         ════════════════════════════════════════════════ -->
    <div class="signup-wrapper">
      <span class="placeholder-label">Flodesk embed goes here</span>
      <p>Paste your Flodesk newsletter signup embed code in place of this block.</p>
    </div>
    <!-- ════════════════════════════════════════════════ -->

    <footer>
      &copy; <script>document.write(new Date().getFullYear())</script> Precon Finder. All rights reserved.
    </footer>

  </div>
</body>
</html>
